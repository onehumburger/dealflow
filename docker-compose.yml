services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dealflow
      POSTGRES_PASSWORD: dealflow_dev
      POSTGRES_DB: dealflow
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://dealflow:dealflow_dev@db:5432/dealflow
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      AUTH_TRUST_HOST: "true"
    volumes:
      - app_storage:/app/storage

volumes:
  pgdata:
  app_storage:
